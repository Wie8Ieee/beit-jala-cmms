        documentType:
          type: string
        documentId:
          type: integer
        fieldName:
          type: string
        eligibleUserId:
          type: integer
        eligibleUserName:
          type: ["string", "null"]
        grantedBy:
          type: ["integer", "null"]
        grantedAt:
          type: string
        revokedAt:
          type: ["string", "null"]

    EligibleSignerInput:
      type: object
      required: [documentType, documentId, fieldName, eligibleUserId]
      properties:
        documentType:
          type: string
        documentId:
          type: integer
        fieldName:
          type: string
        eligibleUserId:
          type: integer

    Signature:
      type: object
      required: [id, documentType, documentId, fieldName, signatureType, userId, userName, signedAt]
      properties:
        id:
          type: integer
        documentType:
          type: string
        documentId:
          type: integer
        fieldName:
          type: string
        signatureType:
          type: string
        userId:
          type: integer
        userName:
          type: string
        eligibleSignerAssignmentId:
          type: ["integer", "null"]
        signedAt:
          type: string

    SignatureInput:
      type: object
      required: [documentType, documentId, fieldName]
