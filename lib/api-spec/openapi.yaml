openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CMMS API — Beit Jala Pharmaceutical Co.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: roles
    description: Roles
  - name: permissions
    description: Permissions
  - name: departments
    description: Departments
  - name: machines
    description: Machines
  - name: equipment
    description: Equipment Information Records
  - name: dashboard
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/permissions:
    put:
      operationId: updateUserPermissions
      tags: [users]
      summary: Set permissions for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPermissionsUpdate"
      responses:
        "200":
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /roles:
    get:
      operationId: getRoles
      tags: [roles]
      summary: List all roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

  /permissions:
    get:
      operationId: getPermissions
      tags: [permissions]
      summary: List all permissions
      responses:
        "200":
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"

  /departments:
    get:
      operationId: getDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /machines:
    get:
      operationId: getMachines
      tags: [machines]
      summary: List all active machines
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by machine name or machine number
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      operationId: createMachine
      tags: [machines]
      summary: Create a new machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineInput"
      responses:
        "201":
          description: Machine created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}:
    get:
      operationId: getMachine
      tags: [machines]
      summary: Get machine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMachine
      tags: [machines]
      summary: Update a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineUpdate"
      responses:
        "200":
          description: Machine updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}/soft-delete:
    patch:
      operationId: softDeleteMachine
      tags: [machines]
      summary: Soft delete a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}/equipment-information:
    get:
      operationId: getEquipmentInformation
      tags: [equipment]
      summary: Get equipment information record for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equipment information record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentInformation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertEquipmentInformation
      tags: [equipment]
      summary: Create or update equipment information record for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentInformationInput"
      responses:
        "200":
          description: Equipment information saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentInformation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginCredentials:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    Role:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]

    Permission:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]

    AuthUser:
      type: object
      required: [id, username, roleId, roleName, permissions, isActive]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        roleId:
          type: integer
        roleName:
          type: string
        permissions:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    User:
      type: object
      required: [id, username, roleId, roleName, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        roleId:
          type: integer
        roleName:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        isActive:
          type: boolean
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, password, roleId]
      properties:
        username:
          type: string
          minLength: 2
        password:
          type: string
          minLength: 4
        fullName:
          type: string
        email:
          type: string
        roleId:
          type: integer
        departmentId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        roleId:
          type: integer
        departmentId:
          type: ["integer", "null"]
        password:
          type: string

    UserPermissionsUpdate:
      type: object
      required: [permissionNames]
      properties:
        permissionNames:
          type: array
          items:
            type: string

    Department:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    Machine:
      type: object
      required: [id, machineNumber, machineName, status, createdAt]
      properties:
        id:
          type: integer
        machineNumber:
          type: string
        machineName:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        status:
          type: string
        pmFrequencyMonths:
          type: ["integer", "null"]
        pmStartDate:
          type: ["string", "null"]
        deletedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    MachineInput:
      type: object
      required: [machineNumber, machineName]
      properties:
        machineNumber:
          type: string
          minLength: 1
        machineName:
          type: string
          minLength: 1
        departmentId:
          type: ["integer", "null"]
        location:
          type: string
        status:
          type: string
        pmFrequencyMonths:
          type: ["integer", "null"]
        pmStartDate:
          type: ["string", "null"]

    MachineUpdate:
      type: object
      properties:
        machineNumber:
          type: string
        machineName:
          type: string
        departmentId:
          type: ["integer", "null"]
        location:
          type: string
        status:
          type: string
        pmFrequencyMonths:
          type: ["integer", "null"]
        pmStartDate:
          type: ["string", "null"]

    EquipmentInformation:
      type: object
      required: [id, machineId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        machineId:
          type: integer
        nameOfEquipment:
          type: ["string", "null"]
        modelNumber:
          type: ["string", "null"]
        serialNumber:
          type: ["string", "null"]
        identificationNumber:
          type: ["string", "null"]
        datePurchased:
          type: ["string", "null"]
        purchasedFromName:
          type: ["string", "null"]
        purchasedFromAddress:
          type: ["string", "null"]
        manufacturingCompanyName:
          type: ["string", "null"]
        manufacturingCompanyAddress:
          type: ["string", "null"]
        dimensionWidthCm:
          type: ["number", "null"]
        dimensionHeightCm:
          type: ["number", "null"]
        dimensionDepthCm:
          type: ["number", "null"]
        weightKg:
          type: ["number", "null"]
        utilitiesPowerSupply:
          type: ["string", "null"]
        utilitiesAir:
          type: ["string", "null"]
        utilitiesWater:
          type: ["string", "null"]
        utilitiesOther:
          type: ["string", "null"]
        others:
          type: ["string", "null"]
        safetyIssues:
          type: ["string", "null"]
        preparedByName:
          type: ["string", "null"]
        preparedByDate:
          type: ["string", "null"]
        approvedByName:
          type: ["string", "null"]
        approvedByDate:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    EquipmentInformationInput:
      type: object
      properties:
        nameOfEquipment:
          type: string
        modelNumber:
          type: string
        serialNumber:
          type: string
        identificationNumber:
          type: string
        datePurchased:
          type: string
        purchasedFromName:
          type: string
        purchasedFromAddress:
          type: string
        manufacturingCompanyName:
          type: string
        manufacturingCompanyAddress:
          type: string
        dimensionWidthCm:
          type: ["number", "null"]
        dimensionHeightCm:
          type: ["number", "null"]
        dimensionDepthCm:
          type: ["number", "null"]
        weightKg:
          type: ["number", "null"]
        utilitiesPowerSupply:
          type: string
        utilitiesAir:
          type: string
        utilitiesWater:
          type: string
        utilitiesOther:
          type: string
        others:
          type: string
        safetyIssues:
          type: string
        preparedByName:
          type: string
        preparedByDate:
          type: string
        approvedByName:
          type: string
        approvedByDate:
          type: string

    DashboardStats:
      type: object
      required: [totalMachines, activeMachines, totalUsers, activeUsers, totalDepartments, machinesByDepartment, machinesByStatus]
      properties:
        totalMachines:
          type: integer
        activeMachines:
          type: integer
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalDepartments:
          type: integer
        machinesByDepartment:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"
        machinesByStatus:
          type: array
          items:
            $ref: "#/components/schemas/CountByLabel"

    CountByLabel:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer
