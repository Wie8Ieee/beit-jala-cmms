components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    EligibleSignerAssignment:
      type: object
      required: [id, documentType, documentId, fieldName, eligibleUserId, grantedAt]
      properties:
