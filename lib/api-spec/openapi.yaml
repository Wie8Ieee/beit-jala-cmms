openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CMMS API — Beit Jala Pharmaceutical Co.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: roles
    description: Roles
  - name: permissions
    description: Permissions
  - name: departments
    description: Departments
  - name: machines
    description: Machines
  - name: equipment
    description: Equipment Information Records
  - name: preventive-maintenance
    description: Preventive Maintenance records and checklists
  - name: maintenance-plans
    description: Annual and monthly preventive maintenance plans
  - name: maintenance-requests
    description: Maintenance requests and corrective maintenance workflow
  - name: corrective-maintenance
    description: Corrective Maintenance records and history
  - name: spare-parts
    description: Spare parts catalogue and stock movements
  - name: dashboard
    description: Dashboard statistics
  - name: signatures
    description: Electronic signatures and eligible signer assignments
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCredentials"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signatures:
    get:
      operationId: listSignatures
      tags: [signatures]
      summary: List immutable signatures for a document
      parameters:
        - name: documentType
          in: query
          required: true
          schema:
            type: string
        - name: documentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signatures for the document
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signature"

  /signatures/eligible:
    get:
      operationId: listEligibleSigners
      tags: [signatures]
      summary: List eligible signer assignments for a document
      parameters:
        - name: documentType
          in: query
          required: true
          schema:
            type: string
        - name: documentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Eligible signer assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EligibleSignerAssignment"
    post:
      operationId: createEligibleSigner
      tags: [signatures]
      summary: Assign an eligible signer to a document field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibleSignerInput"
      responses:
        "201":
          description: Eligible signer assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibleSignerAssignment"

  /signatures/eligible/{id}/revoke:
    patch:
      operationId: revokeEligibleSigner
      tags: [signatures]
      summary: Revoke signer eligibility without deleting old signatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibleSignerAssignment"

  /signatures/sign:
    post:
      operationId: signDocumentField
      tags: [signatures]
      summary: Electronically sign an eligible document field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureInput"
      responses:
        "201":
          description: Field signed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signature"
        "409":
          description: Field already signed and immutable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [users]
      summary: Deactivate a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/permissions:
    put:
      operationId: updateUserPermissions
      tags: [users]
      summary: Set permissions for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPermissionsUpdate"
      responses:
        "200":
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /roles:
    get:
      operationId: getRoles
      tags: [roles]
      summary: List all roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

  /permissions:
    get:
      operationId: getPermissions
      tags: [permissions]
      summary: List all permissions
      responses:
        "200":
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"

  /departments:
    get:
      operationId: getDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /machines:
    get:
      operationId: getMachines
      tags: [machines]
      summary: List all active machines
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by machine name or machine number
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      operationId: createMachine
      tags: [machines]
      summary: Create a new machine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineInput"
      responses:
        "201":
          description: Machine created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}:
    get:
      operationId: getMachine
      tags: [machines]
      summary: Get machine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMachine
      tags: [machines]
      summary: Update a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineUpdate"
      responses:
        "200":
          description: Machine updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}/soft-delete:
    patch:
      operationId: softDeleteMachine
      tags: [machines]
      summary: Soft delete a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
        "404":
          description: Machine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}/equipment-information:
    get:
      operationId: getEquipmentInformation
      tags: [equipment]
      summary: Get equipment information record for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equipment information record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentInformation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: upsertEquipmentInformation
      tags: [equipment]
      summary: Create or update equipment information record for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentInformationInput"
      responses:
        "200":
          description: Equipment information saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentInformation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /machines/{id}/pm/header:
    get:
      operationId: getPmHeader
      tags: [preventive-maintenance]
      summary: Get PM form header for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PM header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmHeader"
    put:
      operationId: updatePmHeader
      tags: [preventive-maintenance]
      summary: Update PM form header for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PmHeaderInput"
      responses:
        "200":
          description: PM header saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmHeader"

  /machines/{id}/pm/checklist:
    get:
      operationId: getPmChecklist
      tags: [preventive-maintenance]
      summary: List PM checklist points for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PmChecklistPoint"
    post:
      operationId: createPmChecklistPoint
      tags: [preventive-maintenance]
      summary: Create PM checklist point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PmChecklistPointInput"
      responses:
        "201":
          description: Checklist point created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmChecklistPoint"

  /machines/{id}/pm/checklist/{pointId}:
    put:
      operationId: updatePmChecklistPoint
      tags: [preventive-maintenance]
      summary: Update PM checklist point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pointId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PmChecklistPointInput"
      responses:
        "200":
          description: Checklist point updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmChecklistPoint"
    patch:
      operationId: deactivatePmChecklistPoint
      tags: [preventive-maintenance]
      summary: Soft-remove PM checklist point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: pointId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist point deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmChecklistPoint"

  /machines/{id}/pm/current:
    get:
      operationId: getCurrentPmRecord
      tags: [preventive-maintenance]
      summary: Get current PM record for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current PM record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmRecordDetail"

  /machines/{id}/pm/inspections:
    post:
      operationId: createPmInspection
      tags: [preventive-maintenance]
      summary: Add a PM inspection column to the current record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PmInspectionInput"
      responses:
        "201":
          description: Inspection saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmRecordDetail"

  /machines/{id}/pm/history:
    get:
      operationId: getPmHistory
      tags: [preventive-maintenance]
      summary: List PM record history for a machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PM record history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PmRecordSummary"

  /maintenance-plans/annual/{year}:
    get:
      operationId: getAnnualPmPlan
      tags: [maintenance-plans]
      summary: Get or generate annual PM plan
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Annual PM plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualPmPlanDetail"
    put:
      operationId: updateAnnualPmPlan
      tags: [maintenance-plans]
      summary: Update annual PM plan approval fields and rows
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnualPmPlanInput"
      responses:
        "200":
          description: Annual PM plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualPmPlanDetail"

  /maintenance-plans/monthly/{year}/{month}:
    get:
      operationId: getMonthlyPmPlan
      tags: [maintenance-plans]
      summary: Get or generate monthly PM plan
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: Monthly PM plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyPmPlanDetail"
    put:
      operationId: updateMonthlyPmPlan
      tags: [maintenance-plans]
      summary: Update monthly PM plan fields and rows
      parameters:
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonthlyPmPlanInput"
      responses:
        "200":
          description: Monthly PM plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyPmPlanDetail"

  /maintenance-requests:
    get:
      operationId: getMaintenanceRequests
      tags: [maintenance-requests]
      summary: List maintenance requests visible to the current user
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [all, own, qa, engineering, technician]
      responses:
        "200":
          description: Maintenance requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRequestSummary"
    post:
      operationId: createMaintenanceRequest
      tags: [maintenance-requests]
      summary: Submit a maintenance request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceRequestInput"
      responses:
        "201":
          description: Maintenance request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"

  /maintenance-requests/machines:
    get:
      operationId: getMaintenanceRequestMachineOptions
      tags: [maintenance-requests]
      summary: List machine options for request submission
      responses:
        "200":
          description: Machine options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRequestMachineOption"

  /maintenance-requests/technicians:
    get:
      operationId: getMaintenanceRequestTechnicians
      tags: [maintenance-requests]
      summary: List Maintenance Technician users for assignment
      responses:
        "200":
          description: Technician options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRequestTechnicianOption"

  /maintenance-requests/{id}:
    get:
      operationId: getMaintenanceRequest
      tags: [maintenance-requests]
      summary: Get maintenance request detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Maintenance request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"

  /maintenance-requests/by-number/{requestNumber}:
    get:
      operationId: getMaintenanceRequestByNumber
      tags: [maintenance-requests]
      summary: Open request by Request / Report Number
      parameters:
        - name: requestNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Maintenance request detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"

  /maintenance-requests/{id}/qa-review:
    post:
      operationId: qaReviewMaintenanceRequest
      tags: [maintenance-requests]
      summary: QA approve or reject maintenance request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionInput"
      responses:
        "200":
          description: Request reviewed by QA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"
    patch:
      operationId: patchQaReviewMaintenanceRequest
      tags: [maintenance-requests]
      summary: QA approve or reject maintenance request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionInput"
      responses:
        "200":
          description: Request reviewed by QA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"

  /maintenance-requests/{id}/engineering-review:
    post:
      operationId: engineeringReviewMaintenanceRequest
      tags: [maintenance-requests]
      summary: Engineering accept or reject QA-approved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionInput"
      responses:
        "200":
          description: Request reviewed by engineering
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"
    patch:
      operationId: patchEngineeringReviewMaintenanceRequest
      tags: [maintenance-requests]
      summary: Engineering accept or reject QA-approved request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionInput"
      responses:
        "200":
          description: Request reviewed by engineering
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRequestDetail"

  /maintenance-requests/{id}/assign-technician:
    patch:
      operationId: assignMaintenanceRequestTechnician
      tags: [maintenance-requests]
      summary: Assign or change technician for an accepted request
      parameters:
        - name: id
