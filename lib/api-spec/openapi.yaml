        email:
          type: ["string", "null"]
        roleId:
          type: integer
        roleName:
          type: string
        permissions:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    User:
      type: object
      required: [id, username, roleId, roleName, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        roleId:
          type: integer
        roleName:
          type: string
        departmentId:
          type: ["integer", "null"]
        departmentName:
          type: ["string", "null"]
        isActive:
          type: boolean
        permissions:
          type: array
